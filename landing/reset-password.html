<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - BuddyList</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Tahoma, 'Segoe UI', Geneva, Verdana, sans-serif;
      background: #ECE9D8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: #ECE9D8;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      max-width: 320px;
      width: 100%;
    }
    .titlebar {
      background: linear-gradient(180deg, #3A6EA5 0%, #0A246A 100%);
      color: white;
      font-weight: bold;
      font-size: 13px;
      padding: 4px 8px;
    }
    .content {
      padding: 20px;
    }
    .icon {
      font-size: 40px;
      text-align: center;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 12px 0;
      color: #333;
      text-align: center;
    }
    label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 4px 6px;
      font-size: 13px;
      font-family: Tahoma, sans-serif;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    input:focus {
      outline: none;
      border-color: #0A246A #B4C7DC #B4C7DC #0A246A;
    }
    .btn {
      background: #ECE9D8;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      padding: 4px 16px;
      font-family: Tahoma, sans-serif;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .btn:hover { background: #F5F3EA; }
    .btn:active {
      border-color: #808080 #ffffff #ffffff #808080;
      background: #DDD8C8;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .error {
      background: #fdd;
      border: 1px solid #c44;
      color: #900;
      padding: 6px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .success {
      background: #dfd;
      border: 1px solid #4a4;
      color: #060;
      padding: 6px;
      font-size: 12px;
      margin-bottom: 10px;
    }
    .hint {
      font-size: 10px;
      color: #888;
      margin-top: -6px;
      margin-bottom: 10px;
    }
    .show-toggle {
      font-size: 11px;
      color: #0000FF;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 10px;
    }
    .show-toggle:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="titlebar">BuddyList - Reset Password</div>
    <div class="content">
      <div class="icon">😎</div>
      <h1>Set New Password</h1>

      <div id="form-container">
        <div id="error-msg" class="error" style="display:none;"></div>
        <div id="success-msg" class="success" style="display:none;"></div>

        <form id="reset-form">
          <label for="password">New Password</label>
          <input type="password" id="password" placeholder="Password" required />
          <div class="hint">8+ characters, 1 number, 1 symbol</div>

          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" placeholder="Password" required />

          <button type="button" class="show-toggle" onclick="togglePassword()">Show passwords</button>
          <br /><br />

          <button type="submit" class="btn" id="submit-btn">Update Password</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Initialize Supabase - reads the token from the URL hash
    const SUPABASE_URL = 'https://mrhpmgzwvyhgwqckyzqm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yaHBtZ3p3dnloZ3dxY2t5enFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0Njc4NDksImV4cCI6MjA4NzA0Mzg0OX0.MNkY4nruEn4kvTxKrQI_OXZs9DciF3GQmjAfOG7Dnkk';

    let supabase;
    let showPw = false;

    function togglePassword() {
      showPw = !showPw;
      document.getElementById('password').type = showPw ? 'text' : 'password';
      document.getElementById('confirm').type = showPw ? 'text' : 'password';
      document.querySelector('.show-toggle').textContent = showPw ? 'Hide passwords' : 'Show passwords';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('reset-form').style.display = 'none';
    }

    async function init() {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Supabase puts the access_token in the URL hash after email link click
      const { data, error } = await supabase.auth.getSession();
      if (error || !data.session) {
        showError('Invalid or expired reset link. Please request a new one from the app.');
        document.getElementById('reset-form').style.display = 'none';
      }
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters');
        return;
      }
      if (!/\d/.test(password)) {
        showError('Password must contain at least 1 number');
        return;
      }
      if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]/.test(password)) {
        showError('Password must contain at least 1 symbol');
        return;
      }

      document.getElementById('submit-btn').disabled = true;
      document.getElementById('submit-btn').textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password });

      if (error) {
        showError(error.message);
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').textContent = 'Update Password';
      } else {
        showSuccess('Password updated! You can close this page and sign in to BuddyList with your new password.');
        await supabase.auth.signOut();
      }
    });

    init();
  </script>
</body>
</html>
