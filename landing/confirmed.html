<!DOCTYPE html>
<html lang="en">
<head>

      min-height: 100vh;
      margin: 0;

    .card {

      padding: 0;

      text-align: center;
    }
    .titlebar {
      background: linear-gradient(180deg, #3A6EA5 0%, #0A246A 100%);
      color: white;
      font-weight: bold;
      font-size: 12px;
      padding: 4px 8px;
      text-align: left;
    }
    .content {
      padding: 24px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #333;
    }
    p {
      font-size: 13px;
      color: #666;
      margin: 0;
      line-height: 1.5;

</head>
<body>
  <div class="card">
    <div class="titlebar">Avatar AIM</div>
